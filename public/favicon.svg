<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>
  </defs>
  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect width="512" height="512" rx="128" fill="url(#innerGlow)" />
  
  <!-- Outer Pulse Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="12" stroke-opacity="0.3" stroke-dasharray="24 16"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#ffffff" stroke-width="16" stroke-opacity="0.5"/>
  
  <!-- Center Mobile Phone Symbol -->
  <rect x="186" y="126" width="140" height="260" rx="28" fill="#0f172a" stroke="#ffffff" stroke-width="12" />
  
  <!-- Phone Notch & Home Pill -->
  <rect x="236" y="142" width="40" height="8" rx="4" fill="#ffffff" opacity="0.8"/>
  <rect x="231" y="360" width="50" height="8" rx="4" fill="#ffffff" opacity="0.8"/>
  
  <!-- Phone Screen Signal Radar -->
  <circle cx="256" cy="246" r="28" fill="#6366f1"/>
  <circle cx="256" cy="246" r="14" fill="#ffffff"/>
  
  <!-- Wave Ripples -->
  <path d="M 216 246 A 40 40 0 0 1 296 246" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
  <path d="M 200 246 A 56 56 0 0 1 312 246" fill="none" stroke="#a855f7" stroke-width="8" stroke-linecap="round"/>
</svg>